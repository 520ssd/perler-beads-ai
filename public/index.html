<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火山引擎 API 测试</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        textarea { width: 100%; height: 100px; margin: 10px 0; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        pre { background: #f5f5f5; padding: 15px; overflow-x: auto; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>火山引擎 API 测试</h1>
    
    <div>
        <h3>Prompt:</h3>
        <textarea id="prompt" placeholder="输入提示词，例如：一只可爱的猫咪"></textarea>
    </div>
    
    <div>
        <h3>图片 Base64 (可选):</h3>
        <textarea id="imageBase64" placeholder="粘贴图片的 base64 数据"></textarea>
        <input type="file" id="imageFile" accept="image/*">
    </div>
    
    <button onclick="testAPI()">发送请求</button>
    
    <h3>响应结果:</h3>
    <pre id="result">等待请求...</pre>

    <script>
        // 图片转 base64
        document.getElementById('imageFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imageBase64').value = e.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function testAPI() {
            const resultEl = document.getElementById('result');
            resultEl.textContent = '请求中...';

            const prompt = document.getElementById('prompt').value || '一只可爱的猫咪';
            const imageBase64 = document.getElementById('imageBase64').value || '';

            try {
                const response = await fetch('/api/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, imageBase64 }),
                });

                const data = await response.json();
                resultEl.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultEl.textContent = '错误: ' + error.message;
            }
        }
    </script>
</body>
</html>
